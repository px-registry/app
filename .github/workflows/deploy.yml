name: Deploy to Cloudflare Pages

# Auto-deploy on push to main. Requires two repo secrets:
#   CLOUDFLARE_API_TOKEN   (Pages:Edit scope)
#   CLOUDFLARE_ACCOUNT_ID
# Until those are set, the initial deploy is done via `wrangler pages deploy`.

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy to Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=px-app --branch=main
