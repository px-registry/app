name = "px-app"
compatibility_date = "2026-05-27"
pages_build_output_dir = "out"

# Day-6 delivery custody. The send-a-pack flow relays file bytes through a Pages
# Function into R2, which holds them for 30 days (lifecycle rule on the bucket)
# and then deletes them. PX never stores them long-term and never reads the
# contents — it only streams them through.
[[r2_buckets]]
binding = "DELIVERIES"
bucket_name = "px-app-deliveries"

# Where receivers download from. Unset (the default) routes downloads through the
# same-origin /api/download proxy — always works, no CORS, no custom domain.
# Set it to a public R2 custom domain (e.g. "https://files.px-registry.org") to
# serve bytes directly from R2 with zero egress cost; the key scheme is identical
# ({pack_id}/{path}), so no code changes are needed — only this var + the domain.
# [vars]
# DELIVERY_PUBLIC_BASE = "https://files.px-registry.org"

# Day-7 owner identity (WebAuthn passkeys). The auth Functions store one record
# per owner — handle → { credential_id, public_key_jwk, recovery_code_hash,
# display_name?, default_category?, created_at } — under key "handle:<handle>".
# No secret key, no PII: PX holds a public key and a recovery-code hash only.
#
# Create the namespace once, then paste its id below:
#   wrangler kv namespace create AUTH
[[kv_namespaces]]
binding = "AUTH"
id = "31c4f53ab2d54dea8a977fa7c719e229"

# Sessions and WebAuthn challenges are carried in HMAC-signed, HttpOnly cookies.
# AUTH_SECRET is that HMAC key. Do NOT commit it: set it as a Pages secret so it
# overrides the insecure local-dev fallback baked into functions/_auth.ts:
#   wrangler pages secret put AUTH_SECRET
